zabbix_export:
  version: '7.2'
  template_groups:
    - uuid: 7df97b18c230490a9a0a9e2307226338
      name: Templates
    - uuid: 36bff7c29af64692839d077febfc7079
      name: 'Templates/Network devices'
  templates:
    - uuid: 22f61a47061445dda0becc9bd787d6ef
      template: 'Opengear OM Console by SNMP'
      name: 'Opengear OM Console by SNMP'
      description: |
        Adjusted from Opengear OG platform to Opengear OM platform by Eric Eisenhart
        
        ## Original Author
        
        David Angelovich
      groups:
        - name: Templates
        - name: 'Templates/Network devices'
      items:
        - uuid: c02a22f99add4a1388a123b3288ac092
          name: 'Firmware Version'
          type: SNMP_AGENT
          snmp_oid: 'OG-OMTELEM-MIB::ogOmSystemFirmwareVersion.0'
          key: opengear.firmwareversion
          delay: '3600'
          history: 14d
          value_type: CHAR
          inventory_link: OS
          tags:
            - tag: Application
              value: OPENGEAR_SYSTEM
          triggers:
            - uuid: 813da25ed7ea46e0bb6223c53a73637e
              expression: '(last(/Opengear OM Console by SNMP/opengear.firmwareversion,#1)<>last(/Opengear OM Console by SNMP/opengear.firmwareversion,#2))<>0'
              name: 'Firmware Version Changed'
              priority: INFO
        - uuid: ba693f7677d44be1ab921e8e570bd246
          name: 'Serial Number'
          type: SNMP_AGENT
          snmp_oid: 'OG-OMTELEM-MIB::ogOmSystemSerialNumber.0'
          key: opengear.serialnumber
          delay: '3600'
          history: 14d
          value_type: CHAR
          inventory_link: SERIALNO_B
          tags:
            - tag: Application
              value: OPENGEAR_SYSTEM
          triggers:
            - uuid: 810055cca38c4c408505b1e0f7123ac2
              expression: '(last(/Opengear OM Console by SNMP/opengear.serialnumber,#1)<>last(/Opengear OM Console by SNMP/opengear.serialnumber,#2))<>0'
              name: 'Serial Number Changed'
              priority: INFO
        - uuid: 41d431383f90468eaba82010168fb41c
          name: 'System Uptime'
          type: SNMP_AGENT
          snmp_oid: 'HOST-RESOURCES-MIB::hrSystemUptime.0'
          key: opengear.systemuptime
          delay: '60'
          history: 14d
          description: 'System Uptime in centiseconds (hundredths of a second: 0.01s)'
          tags:
            - tag: Application
              value: OPENGEAR_SYSTEM
          triggers:
            - uuid: a73af94913e24849b37601e6824df8aa
              expression: 'last(/Opengear OM Console by SNMP/opengear.systemuptime)<avg(/Opengear OM Console by SNMP/opengear.systemuptime,15m)'
              name: 'Device Restarted'
              priority: AVERAGE
      discovery_rules:
        - uuid: f98456c03ec44226bdfcb82d5e3620ad
          name: 'Network Interfaces'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#IFNAME}, IF-MIB::ifDescr]'
          key: opengear.snmp.if
          delay: '3600'
          enabled_lifetime_type: DISABLE_NEVER
          item_prototypes:
            - uuid: 16ca11b74747471086883842aa598b8e
              name: 'Interface {#IFNAME} Inbound Discards'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifInDiscards.{#SNMPINDEX}'
              key: 'opengear.snmp.netif.indiscards[{#IFNAME}]'
              delay: '60'
              history: 14d
              preprocessing:
                - type: SIMPLE_CHANGE
              tags:
                - tag: Application
                  value: OPENGEAR_NETWORK
            - uuid: 0e30c8d5ce5a4d1b98f9a53102ee1d7e
              name: 'Interface {#IFNAME} Inbound Errors'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifInErrors.{#SNMPINDEX}'
              key: 'opengear.snmp.netif.inerr[{#IFNAME}]'
              delay: '60'
              history: 14d
              preprocessing:
                - type: SIMPLE_CHANGE
              tags:
                - tag: Application
                  value: OPENGEAR_NETWORK
            - uuid: fe9e9aa52a614867995b993fec34079e
              name: 'Interface {#IFNAME} Inbound Traffic'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifHCInOctets.{#SNMPINDEX}'
              key: 'opengear.snmp.netif.in[{#IFNAME}]'
              delay: '60'
              history: 14d
              units: bits
              preprocessing:
                - type: CHANGE_PER_SECOND
                - type: MULTIPLIER
                  parameters:
                    - '8'
              tags:
                - tag: Application
                  value: OPENGEAR_NETWORK
            - uuid: 4c6bfc308a5d4cc39463f06818ece358
              name: 'Interface {#IFNAME} SysUptime At Last Status Change'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifLastChange.{#SNMPINDEX}'
              key: 'opengear.snmp.netif.lastchange[{#IFNAME}]'
              delay: '60'
              history: 14d
              description: 'The value of sysUpTime at the time the interface entered its current operational state.  If the current state was entered prior to the last re-initialization of the local network management subsystem, then this object contains a zero value.'
              tags:
                - tag: Application
                  value: OPENGEAR_NETWORK
              trigger_prototypes:
                - uuid: 1697e66133234ab0ba855d38715e02bf
                  expression: 'change(/Opengear OM Console by SNMP/opengear.snmp.netif.lastchange[{#IFNAME}])>0 and last(/Opengear OM Console by SNMP/opengear.snmp.netif.lastchange[{#IFNAME}])<>0'
                  recovery_mode: NONE
                  name: 'Status changed for interface {#IFNAME}'
                  priority: WARNING
                  description: |
                    This trigger detects changes based on the system uptime at the last interface change (which is stored for each interface).
                    If the value is 0, it means the interface hasn't changed since before the last system boot.
                  manual_close: 'YES'
            - uuid: 7f61c1bc89da4ed2ba0a416bb61fd7da
              name: 'Interface {#IFNAME} Outbound Discards'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifOutDiscards.{#SNMPINDEX}'
              key: 'opengear.snmp.netif.outdiscards[{#IFNAME}]'
              delay: '60'
              history: 14d
              preprocessing:
                - type: SIMPLE_CHANGE
              tags:
                - tag: Application
                  value: OPENGEAR_NETWORK
            - uuid: b98feb7330cb4c2ba70162104af371a0
              name: 'Interface {#IFNAME} Outbound Errors'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifOutErrors.{#SNMPINDEX}'
              key: 'opengear.snmp.netif.outerr[{#IFNAME}]'
              delay: '60'
              history: 14d
              preprocessing:
                - type: SIMPLE_CHANGE
              tags:
                - tag: Application
                  value: OPENGEAR_NETWORK
            - uuid: d99d28f02ab74b3786806de1975d384f
              name: 'Interface {#IFNAME} Outbound Traffic'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifHCOutOctets.{#SNMPINDEX}'
              key: 'opengear.snmp.netif.out[{#IFNAME}]'
              delay: '60'
              history: 14d
              units: bits
              preprocessing:
                - type: CHANGE_PER_SECOND
                - type: MULTIPLIER
                  parameters:
                    - '8'
              tags:
                - tag: Application
                  value: OPENGEAR_NETWORK
            - uuid: 93a4191805534e2f85c36377570b31db
              name: 'Interface {#IFNAME} Operational Status'
              type: SNMP_AGENT
              snmp_oid: 'interfaces.ifTable.ifEntry.ifOperStatus.{#SNMPINDEX}'
              key: 'opengear.snmp.netif.status[{#IFNAME}]'
              delay: '60'
              history: 14d
              valuemap:
                name: 'SNMP interface status (ifOperStatus)'
              tags:
                - tag: Application
                  value: OPENGEAR_NETWORK
          graph_prototypes:
            - uuid: 93e2405e21fa4509820b18aba79425be
              name: 'Network traffic on {#IFNAME}'
              graph_items:
                - color: 00EE00
                  item:
                    host: 'Opengear OM Console by SNMP'
                    key: 'opengear.snmp.netif.in[{#IFNAME}]'
                - sortorder: '1'
                  color: 0000CC
                  item:
                    host: 'Opengear OM Console by SNMP'
                    key: 'opengear.snmp.netif.out[{#IFNAME}]'
                - sortorder: '2'
                  color: 0000C8
                  yaxisside: RIGHT
                  item:
                    host: 'Opengear OM Console by SNMP'
                    key: 'opengear.snmp.netif.inerr[{#IFNAME}]'
                - sortorder: '3'
                  color: C8C800
                  yaxisside: RIGHT
                  item:
                    host: 'Opengear OM Console by SNMP'
                    key: 'opengear.snmp.netif.outerr[{#IFNAME}]'
                - sortorder: '4'
                  color: C800C8
                  yaxisside: RIGHT
                  item:
                    host: 'Opengear OM Console by SNMP'
                    key: 'opengear.snmp.netif.indiscards[{#IFNAME}]'
                - sortorder: '5'
                  color: 00C8C8
                  yaxisside: RIGHT
                  item:
                    host: 'Opengear OM Console by SNMP'
                    key: 'opengear.snmp.netif.outdiscards[{#IFNAME}]'
        - uuid: 2e7ee1812a9b4a9f8b87ac2b9a32b324
          name: 'Serial Ports'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#PORTNAME}, OG-OMTELEM-MIB::ogOmSerialPortLabel]'
          key: opengear.snmp.serialport
          delay: '3600'
          enabled_lifetime_type: DISABLE_NEVER
          item_prototypes:
            - uuid: fa1281017db546479186885387bd6f13
              name: 'Port {#SNMPINDEX} ({#PORTNAME}) Traffic Inbound'
              type: SNMP_AGENT
              snmp_oid: 'OG-OMTELEM-MIB::ogOmSerialPortRxBytes.{#SNMPINDEX}'
              key: 'opengear.snmp.serialport.rxbytes[{#PORTNAME}]'
              delay: '300'
              history: 14d
              units: B
              preprocessing:
                - type: SIMPLE_CHANGE
              tags:
                - tag: Application
                  value: OPENGEAR_SERIALPORT
            - uuid: 54880ff9c73b40aaaa708fd07ddec4ff
              name: 'Port {#SNMPINDEX} ({#PORTNAME}) Speed'
              type: SNMP_AGENT
              snmp_oid: 'OG-OMTELEM-MIB::ogOmSerialPortSpeed.{#SNMPINDEX}'
              key: 'opengear.snmp.serialport.speed[{#PORTNAME}]'
              delay: '3600'
              history: 14d
              tags:
                - tag: Application
                  value: OPENGEAR_SERIALPORT
            - uuid: 91ccaaee767841a1a1f6fea7e4069161
              name: 'Port {#SNMPINDEX} ({#PORTNAME}) Traffic Outbound'
              type: SNMP_AGENT
              snmp_oid: 'OG-OMTELEM-MIB::ogOmSerialPortTxBytes.{#SNMPINDEX}'
              key: 'opengear.snmp.serialport.txbytes[{#PORTNAME}]'
              delay: '300'
              history: 14d
              units: B
              preprocessing:
                - type: SIMPLE_CHANGE
              tags:
                - tag: Application
                  value: OPENGEAR_SERIALPORT
      tags:
        - tag: class
          value: network
        - tag: target
          value: om
        - tag: target
          value: opengear
      valuemaps:
        - uuid: 5bf246e9c6cc45fe935fa76d87e5232a
          name: 'SNMP interface status (ifOperStatus)'
          mappings:
            - value: '1'
              newvalue: up
            - value: '2'
              newvalue: down
            - value: '3'
              newvalue: testing
            - value: '4'
              newvalue: unknown
            - value: '5'
              newvalue: dormant
            - value: '6'
              newvalue: notPresent
            - value: '7'
              newvalue: lowerLayerDown
